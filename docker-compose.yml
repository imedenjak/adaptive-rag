services:
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./app/qdrant_db:/qdrant/storage

  postgres:
    image: postgres:16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: chat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d chat"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: rag-streamlit
    ports:
      - "8501:8501" # ← Streamlit port
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql://rag:rag@postgres:5432/chat
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
