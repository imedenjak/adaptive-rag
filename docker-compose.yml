services:

  db:
    image: pgvector/pgvector:pg16
    container_name: rag-db
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: rag_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data    # data persists across restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: rag-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
          POSTGRES_CONNECTION_STRING: postgresql+psycopg://rag_user:rag_password@db:5432/rag_db
    depends_on:
      db:
        condition: service_healthy    # waits for postgres to be ready
    restart: on-failure

volumes:
  pgdata:
